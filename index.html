<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Booking Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Hotel Booking Form</h1>

    <form id="bookingForm">

    <div class="form-grid">

        <div class="form-group">
            <label for="checkin">Check-in Date</label>
            <input type="date" id="checkin" required>
            <small class="error" id="checkinError"></small>
        </div>

        <div class="form-group">
            <label for="checkout">Check-out Date</label>
            <input type="date" id="checkout" required>
            <small class="error" id="checkoutError"></small>
        </div>

        <div class="form-group">
            <label for="roomType">Room Type</label>
            <select id="roomType" required>
                <option value="">Select Room</option>
                <option value="Single">Single</option>
                <option value="Double">Double</option>
                <option value="Suite">Suite</option>
            </select>
            <small class="error" id="roomError"></small>
        </div>

        <div class="form-group">
            <label for="guests">Number of Guests</label>
            <input type="number" id="guests" min="1" required>
            <small class="error" id="guestError"></small>
        </div>

        <div class="form-group full-width">
            <label for="requests">Special Requests</label>
            <textarea id="requests" rows="4"></textarea>
        </div>

    </div>

    <button type="submit">Book Now</button>

</form>

    <!-- Booking Summary Section -->
    <div class="summary" id="bookingSummary" style="display: none;">
        <h2>Booking Summary</h2>
        <p><strong>Room Type:</strong> <span id="summaryRoom"></span></p>
        <p><strong>Total Nights:</strong> <span id="summaryNights"></span></p>
        <p><strong>Total Price:</strong> ₹<span id="summaryPrice"></span></p>
    </div>

    <div class="success-popup" id="successPopup">
    <div class="success-box">
        <h2>Booking Confirmed 🎉</h2>
        <p>Your room has been successfully booked.</p>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
